    /profile/{userId}:
        get:
            summary: Get another user's public profile (active profiles only)
            tags: [Profile]
            security:
                - bearerAuth: []
            parameters:
                - in: path
                  name: userId
                  required: true
                  schema: { type: integer }
                  example: 2
            responses:
                "200":
                    $ref: "#/components/responses/PublicProfileResponse"
                "404":
                    $ref: "#/components/responses/NotFoundError"

    /media:
        get:
            summary: List my media (ordered by orderIndex)
            tags: [Media]
            security:
                - bearerAuth: []
            responses:
                "200":
                    $ref: "#/components/responses/MediaListResponse"

    /media/upload:
        post:
            summary: Upload a single photo or video (WebP pipeline, 7s video cap, 6-item cap)
            tags: [Media]
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            required: [file]
                            properties:
                                file: { type: string, format: binary }
                                source: { type: string, enum: [app_internal_camera, camera_roll], example: camera_roll }
                                isFitness: { type: boolean, example: true }
            responses:
                "201":
                    $ref: "#/components/responses/MediaUploadResponse"
                "400":
                    $ref: "#/components/responses/BadRequestError"
                "409":
                    $ref: "#/components/responses/ConflictError"
                "422":
                    $ref: "#/components/responses/ValidationError"

    /media/reorder:
        put:
            summary: Reorder my media
            tags: [Media]
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [items]
                            properties:
                                items:
                                    type: array
                                    example:
                                        - { id: 3, orderIndex: 1 }
                                        - { id: 4, orderIndex: 2 }
                                        - { id: 12, orderIndex: 3 }
                                        - { id: 13, orderIndex: 4 }
                                    items:
                                        type: object
                                        properties:
                                            id: { type: integer }
                                            orderIndex: { type: integer }
            responses:
                "200":
                    $ref: "#/components/responses/MediaReorderResponse"

    /media/{id}/setmain:
        put:
            summary: Set a media item as main profile photo (must be a photo with a clear face)
            tags: [Media]
            security:
                - bearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  schema: { type: integer }
                  example: 3
            responses:
                "200":
                    $ref: "#/components/responses/MediaSetMainResponse"
                "404":
                    $ref: "#/components/responses/NotFoundError"
                "422":
                    $ref: "#/components/responses/ValidationError"

    /media/{id}/markfitness:
        put:
            summary: Toggle the fitness tag on a media item
            tags: [Media]
            security:
                - bearerAuth: []
            parameters:
                - in: path
                  name: id
                  required: true
                  schema: { type: integer }
                  example: 4
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [isFitness]
                            properties:
                                isFitness: { type: boolean, example: true }
