                - in: path
                  name: id
                  required: true
                  schema: { type: integer }
                  example: 12
            responses:
                "200":
                    $ref: "#/components/responses/MediaDeleteResponse"
                "404":
                    $ref: "#/components/responses/NotFoundError"

    /progress/me:
        get:
            summary: List my own progress captures (newest first)
            tags: [Progress]
            security:
                - bearerAuth: []
            responses:
                "200":
                    $ref: "#/components/responses/ProgressListResponse"

    /progress/upload:
        post:
