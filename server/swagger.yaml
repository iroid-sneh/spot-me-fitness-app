                    $ref: "#/components/responses/LifestyleUpdateResponse"

    /profile/location:
        put:
            summary: Update raw coordinates (discovery exposes only distance)
            tags: [Profile]
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [latitude, longitude]
